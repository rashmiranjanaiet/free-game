<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JUST A game</title>
  <script type="module" crossorigin src="/assets/index-9GnCT_IA.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-B-o-qJK5.css">
</head>
<body>
  <div id="introVideoOverlay" aria-label="Intro video">
    <video id="introVideo" autoplay muted playsinline preload="auto">
      <source src="/media/top-banner.mp4" type="video/mp4" />
    </video>
  </div>
  <div id="hud">
    <div id="playerSignals">
      <div class="signals-title">Live Players: <span id="playersValue">1</span></div>
      <div id="playerSignalsList" class="signals-list">No other players</div>
    </div>
  </div>
  <div id="controlPad" aria-label="On-screen controls">
    <div id="leftStick" aria-label="Direction control">
      <button class="stick-touch hold-btn stick-up" type="button" data-key="ArrowUp" aria-label="Forward"></button>
      <button class="stick-touch hold-btn stick-down" type="button" data-key="ArrowDown" aria-label="Reverse"></button>
      <button class="stick-touch hold-btn stick-left" type="button" data-key="ArrowLeft" aria-label="Left"></button>
      <button class="stick-touch hold-btn stick-right" type="button" data-key="ArrowRight" aria-label="Right"></button>
      <div class="stick-ring"></div>
      <div class="stick-core"></div>
    </div>
    <div id="rightActions" aria-label="Action controls">
      <button class="orb-btn action-btn" id="padBoostBtn" type="button" aria-label="Boost">
        <span class="orb-face">🔥</span>
        <span class="orb-text">Boost</span>
      </button>
      <button class="orb-btn action-btn" id="padMissileBtn" type="button" aria-label="Missile">
        <span class="orb-face">🚀</span>
        <span class="orb-text">Missile</span>
      </button>
      <button class="orb-btn action-btn" id="padStartBtn" type="button" aria-label="Restart">
        <span class="orb-face">↻</span>
        <span class="orb-text">Restart</span>
      </button>
    </div>
  </div>
  <canvas id="game"></canvas>

</body>
</html>
